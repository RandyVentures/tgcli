name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Format check
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "Files not formatted:"
            echo "$out"
            exit 1
          fi

      - name: Lint
        run: go vet ./...

      - name: Test
        run: go test -v ./...

      - name: Build
        run: go build -o ./dist/tgcli ./cmd/tgcli

      - name: Verify binary
        run: ./dist/tgcli version
